# grafana-datasources.yaml — Pre-configure Loki data source in Grafana

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 5000
      derivedFields: []

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
