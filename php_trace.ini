; ============================================================================
; php_trace.ini — PHP Trace Extension Configuration
;
; Copy to your PHP conf.d directory:
;   cp php_trace.ini /etc/php/8.x/mods-available/php_trace.ini
;
; Or load inline:
;   php -d extension=php_trace -c php_trace.ini test_trace.php
; ============================================================================

extension=php_trace.so

; ----------------------------------------------------------------------------
; Master switch
; ----------------------------------------------------------------------------
php_trace.enabled = 1

; ----------------------------------------------------------------------------
; Service identification
; ----------------------------------------------------------------------------
php_trace.service_name = "my-php-app"

; ----------------------------------------------------------------------------
; Exporter selection (environment-variable driven)
; ----------------------------------------------------------------------------
; Set via env: PHP_TRACE_EXPORTER=loki|tempo  (default: loki)
; Set via env: PHP_TRACE_TEMPO_ENDPOINT=http://tempo:4318/v1/traces
; (default: same as loki.endpoint, which is usually wrong for Tempo)
; Example in docker-compose / k8s:
;   env:
;     PHP_TRACE_EXPORTER: tempo
;     PHP_TRACE_TEMPO_ENDPOINT: http://tempo:4318/v1/traces

; ----------------------------------------------------------------------------
; Loki connection (used when exporter is "loki")
; ----------------------------------------------------------------------------
php_trace.loki.endpoint = "http://loki:3100/loki/api/v1/push"
;php_trace.loki.username = ""
;php_trace.loki.password = ""
;php_trace.loki.tenant_id = ""

; ----------------------------------------------------------------------------
; Batching — controls how traces are sent to Loki / Tempo
; ----------------------------------------------------------------------------
; Maximum spans per HTTP POST request
php_trace.loki.batch_size = 512

; Minimum interval (seconds) between flushes (even if batch is not full)
php_trace.loki.flush_interval = 5

; ----------------------------------------------------------------------------
; Sampling — reduce overhead with probabilistic sampling
; ----------------------------------------------------------------------------
; 1.0 = trace every request, 0.1 = trace 10%, 0.0 = disabled
php_trace.sample_rate = 1.0

; ----------------------------------------------------------------------------
; Buffer — span ring buffer capacity
; ----------------------------------------------------------------------------
; Spans older than buffer capacity are dropped (FIFO lossy mode)
php_trace.max_spans = 65536

; ----------------------------------------------------------------------------
; What to capture
; ----------------------------------------------------------------------------
; Capture function arguments (can be large, use with caution)
php_trace.capture_args = 1

; Capture return values
php_trace.capture_return = 1

; Truncate argument values longer than N characters
php_trace.max_arg_length = 256

; ----------------------------------------------------------------------------
; Tracing scope
; ----------------------------------------------------------------------------
; Trace user-defined functions
php_trace.trace_user = 0

; Trace built-in/internal functions (e.g. mysqli_query, curl_exec)
php_trace.trace_internal = 0

; ----------------------------------------------------------------------------
; Filters — PCRE regex patterns (applied to ClassName::functionName)
; ----------------------------------------------------------------------------
; Only trace functions matching this pattern (default: common blocking I/O)
php_trace.include_pattern = "^(mysqli_|mysql_|PDO::|PDOStatement::|curl_|fsockopen|stream_socket_client|file_get_contents|fopen|stream_socket_|socket_|redis_|ldap_|pg_|sqlite_)"

; Skip functions matching this pattern (e.g. framework internals)
;php_trace.exclude_pattern = "^(Composer\\|array_|str_|is_)"

; ----------------------------------------------------------------------------
; Nesting
; ----------------------------------------------------------------------------
; Maximum call depth to trace (0 = no limit)
php_trace.max_depth = 64

; ============================================================================
; Environment variables (not INI — set via shell / docker / k8s)
; ============================================================================
; PHP_TRACE_EXPORTER       — "loki" (default) or "tempo"
; PHP_TRACE_TEMPO_ENDPOINT — OTLP HTTP endpoint, e.g. http://tempo:4318/v1/traces
;                            default: same as php_trace.loki.endpoint
