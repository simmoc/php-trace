# docker-compose.yml — Grafana Loki + Grafana for PHP Trace
#
# Start the monitoring stack:
#   docker-compose up -d
#
# Access:
#   Grafana: http://localhost:3000  (admin / admin)
#   Loki:    http://localhost:3100
#
# In Grafana:
#   1. Add Loki data source: http://loki:3100
#   2. Explore: {job="php-trace"}
#   3. Import dashboard: Dashboards → Import → Upload loki-dashboard.json

services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    ports:
      - "3200:3200"
      - "4318:4318"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - loki

  php-trace-83:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: "8.3"
    image: php-trace:8.3
    container_name: php-trace-83
    volumes:
      - ./:/usr/src/myapp
    working_dir: /usr/src/myapp
    command: php test_tempo_verify.php
    restart: no
    environment:
      - PHP_TRACE_LOKI_ENDPOINT=http://loki:3100/loki/api/v1/push
      - PHP_TRACE_EXPORTER=tempo
      - PHP_TRACE_TEMPO_ENDPOINT=http://tempo:4318/v1/traces
      - PHP_TRACE_CAPTURE_ARGS=1
      - PHP_TRACE_CAPTURE_RETURN=1
    networks:
      - monitoring
    depends_on:
      - loki
      - tempo
volumes:
  loki-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
